<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrada de Inventario — NeuraLoom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:   #040a07; 
    --card-bg:   #08140f;
    --input-bg:  #020604;
    --teal:      #00c9a7;
    --teal-dim:  rgba(0,201,167,0.1);
    --white:     #e8f2ee;
    --muted:     #6b9e85;
    --border:    rgba(0,201,167,0.15);
    --sans: 'Poppins', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg-dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .form-container { width: 100%; max-width: 500px; }

  .btn-volver {
    display: inline-flex;
    align-items: center;
    color: var(--teal);
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.8;
  }
  .btn-volver:hover { opacity: 1; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 15px;
  }

  .section-label {
    color: var(--teal);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .form-group { margin-bottom: 20px; }
  
  label {
    display: block;
    font-size: 14px;
    margin-bottom: 8px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 14px;
  }

  input:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-dim);
  }

  /* Estilo para el input de escáner */
  .scanner-input {
    border-left: 4px solid var(--teal);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .btn-submit {
    width: 100%;
    background: var(--teal);
    color: var(--bg-dark);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
  }

  .btn-submit:hover {
    background: #00ebd3;
    transform: translateY(-2px);
  }

  .status-tag {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    margin-top: 8px;
    display: none; /* Se activa con JS */
  }
</style>
</head>
<body>

<div class="form-container">
  <a href="index.html" class="btn-volver">← Volver al Dashboard</a>

  <div class="card">
    <div class="card-header">
      <span>📦</span>
      <h2 style="font-size: 18px; text-transform: uppercase;">Entrada de Inventario</h2>
    </div>

    <form id="entradaForm">
      
      <div class="form-group">
        <div class="section-label">🔍 Escaneo Obligatorio</div>
        <label>ID / Código de Barras</label>
        <input type="text" id="id_producto" class="scanner-input" placeholder="Dispare el escáner aquí..." autofocus required>
        <div id="status" class="status-tag" style="background: var(--teal-dim); color: var(--teal);">
          Producto reconocido
        </div>
      </div>

      <div class="form-group">
        <div class="section-label">📋 Información</div>
        <label>Nombre del Producto</label>
        <input type="text" id="nombre" placeholder="Se autocompletará si existe..." readonly>
      </div>

      <div class="row">
        <div class="form-group">
          <div class="section-label">🔢 Operación</div>
          <label>Cantidad a ingresar</label>
          <input type="number" id="stock_actual" placeholder="0" min="1" required>
        </div>
        
        <div class="form-group">
          <div class="section-label">🏷️ Categoría</div>
          <label>Categoría</label>
          <input type="text" id="categoria" placeholder="..." readonly>
        </div>
      </div>

      <button type="submit" class="btn-submit">Registrar en Sheets →</button>
    </form>
  </div>
</div>

<script>
  const barcodeInput = document.getElementById('id_producto');
  const cantidadInput = document.getElementById('stock_actual');

  // El escáner suele enviar un "Enter" al final del código
  barcodeInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault(); 
      // Aquí el cursor salta a cantidad automáticamente
      cantidadInput.focus();
      
      // Simulación de búsqueda (aquí llamarías a n8n en el futuro)
      document.getElementById('status').style.display = 'inline-block';
      console.log("Código escaneado: " + this.value);
    }
  });

  document.getElementById('entradaForm').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('Enviando datos a n8n...');
    // Aquí puedes resetear el formulario y volver el foco al código de barras
    e.target.reset();
    barcodeInput.focus();
    document.getElementById('status').style.display = 'none';
  });
</script>

</body>
</html>
