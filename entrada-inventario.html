<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrada de Inventario — NeuraLoom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:   #040a07; 
    --card-bg:   #08140f;
    --input-bg:  #020604;
    --teal:      #00c9a7;
    --teal-dim:  rgba(0,201,167,0.1);
    --white:     #e8f2ee;
    --muted:     #6b9e85;
    --border:    rgba(0,201,167,0.15);
    --sans: 'Poppins', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg-dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .form-container {
    width: 100%;
    max-width: 480px;
  }

  /* Botón Volver estilo Ghost */
  .btn-volver {
    display: inline-flex;
    align-items: center;
    background: none;
    border: 1px solid var(--border);
    color: var(--teal);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    margin-bottom: 24px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-volver:hover {
    background: var(--teal-dim);
    border-color: var(--teal);
  }

  /* Tarjeta de Formulario */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 15px;
  }
  .card-header span { font-size: 20px; }
  .card-header h2 { 
    font-size: 18px; 
    font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: 1px;
    color: var(--white);
  }

  /* Etiquetas y Grupos */
  .form-group { margin-bottom: 20px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--teal);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--white);
  }
  .field-label span { color: var(--teal); margin-left: 4px; }

  /* Inputs y Selects */
  input, select, textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 14px;
    transition: all 0.2s ease;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 4px var(--teal-dim);
  }

  input::placeholder { color: #2a3d34; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  /* Botón de Envío Neón */
  .btn-submit {
    width: 100%;
    background: var(--teal);
    color: var(--bg-dark);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
    transition: all 0.3s;
  }

  .btn-submit:hover {
    background: #00ebd3;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 201, 167, 0.2);
  }

</style>
</head>
<body>

<div class="form-container">
  
  <a href="index.html" class="btn-volver">
    ← Volver
  </a>

  <div class="card">
    <div class="card-header">
      <span>📦</span>
      <h2>Entrada de Inventario</h2>
    </div>

    <form id="entradaForm">
      
      <div class="form-group">
        <div class="section-label">📦 Producto</div>
        <label class="field-label">Nombre del producto<span>*</span></label>
        <input type="text" placeholder="Ej: Coca-Cola 500ml" required>
      </div>

      <div class="row">
        <div class="form-group">
          <div class="section-label">🔢 Cantidad</div>
          <label class="field-label">Unidades<span>*</span></label>
          <input type="number" placeholder="0" min="1" required>
        </div>
        
        <div class="form-group">
          <div class="section-label">🏢 Origen</div>
          <label class="field-label">Proveedor</label>
          <select>
            <option value="">Selecciona...</option>
            <option value="pali">Pali</option>
            <option value="cefa">CEFA</option>
            <option value="dos_pinos">Dos Pinos</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <div class="section-label">📝 Notas</div>
        <label class="field-label">Comentarios</label>
        <textarea rows="2" placeholder="Opcional..."></textarea>
      </div>

      <button type="submit" class="btn-submit">
        Registrar entrada →
      </button>

    </form>
  </div>
</div>

<script>
  // Prevención de envío para pruebas
  document.getElementById('entradaForm').addEventListener('submit', (e) => {
    e.preventDefault();
    console.log("Datos listos para enviar a n8n");
  });
</script>

</body>
</html>
